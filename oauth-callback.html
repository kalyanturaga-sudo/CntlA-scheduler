<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing in…</title>
<style>
  body {
    font-family: 'DM Sans', sans-serif;
    background: #1e1c18; color: #f0ece6;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; margin: 0; text-align: center;
  }
</style>
</head>
<body>
  <div>☁️ Signing in with GitHub…</div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        sessionStorage.setItem('OT_OAUTH_ERROR', error);
      } else if (code) {
        // Store the GitHub authorization code
        sessionStorage.setItem('OT_GITHUB_CODE', code);
        
        // Exchange code for access token
        exchangeCodeForToken(code);
      }

      function exchangeCodeForToken(code) {
        const CLIENT_ID = 'YOUR_GITHUB_CLIENT_ID_HERE';
        const CLIENT_SECRET = 'YOUR_GITHUB_CLIENT_SECRET_HERE';

        // Option 1: If you have a backend/serverless function
        // Make a request to your backend to exchange the code
        fetch('/.netlify/functions/github-auth', {
          method: 'POST',
          body: JSON.stringify({
            code: code,
            clientId: CLIENT_ID,
            clientSecret: CLIENT_SECRET
          })
        })
        .then(response => response.json())
        .then(data => {
          if (data.access_token) {
            sessionStorage.setItem('OT_ACCESS_TOKEN', data.access_token);
            sessionStorage.setItem('OT_TOKEN_EXPIRES', String(Date.now() + (3600 * 1000)));
            redirectHome();
          } else {
            sessionStorage.setItem('OT_OAUTH_ERROR', 'Failed to get access token');
            redirectHome();
          }
        })
        .catch(error => {
          console.error('Token exchange error:', error);
          sessionStorage.setItem('OT_OAUTH_ERROR', 'Network error during login');
          redirectHome();
        });
      }

      function redirectHome() {
        const returnPath = sessionStorage.getItem('OT_RETURN_PATH') || './';
        setTimeout(() => {
          window.location.replace(returnPath);
        }, 1000);
      }
    })();
  </script>
</body>
</html>
