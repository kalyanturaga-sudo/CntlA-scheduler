<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%233a8c5c'/%3E%3Cpath d='M7 16.5l6 6 12-12' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<title data-page="Workout Planner">Workout Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="storage.js"></script>
<style>

/* ===== GLOBAL LAYOUT CSS ===== */
:root {
  --nav-width: 200px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 4px;
  --radius-md: 8px;
}
[data-theme="dark"] {
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; }
.topbar { position:fixed; top:0; left:var(--nav-width); right:0; height:48px; z-index:2000; }
.panels { position:fixed; top:48px; left:var(--nav-width); right:0; bottom:0; overflow:hidden; }
.panel { position:absolute; inset:0; opacity:0; pointer-events:none; overflow-y:auto; transition:opacity 0.15s; }
.panel.active { opacity:1; pointer-events:all; }

/* ===== NAV ===== */
.nav {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--nav-width);
  background: #ffffff;
  border-right: 1px solid rgba(0,0,0,0.08);
  display: flex; flex-direction: column;
  padding: 24px 0; z-index: 100;
  box-shadow: 2px 0 16px rgba(0,0,0,0.04);
  transition: background 0.3s;
}
[data-theme="dark"] .nav { background: #18181d; border-right-color: rgba(255,255,255,0.08); }

.nav a {
  display: block; padding: 8px 20px;
  font-size: 13px; color: #5c5a60;
  text-decoration: none; transition: all 0.15s;
  border-left: 3px solid transparent;
}
[data-theme="dark"] .nav a { color: #a3a1a8; }
.nav a:hover { color: #16151a; background: #f8f7f5; transform: translateX(4px); }
[data-theme="dark"] .nav a:hover { color: #ededf0; background: #1f1f26; transform: translateX(4px); }
.nav a.active { color: #1d4fd6; font-weight: 600; border-left-color: #1d4fd6; background: rgba(29,79,214,0.12); }
[data-theme="dark"] .nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-soft); }

.nav-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px 14px; border-bottom: 1px solid var(--border);
  margin-bottom: 10px; gap: 6px;
}
.nav-header .nav-title {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--accent);
  padding: 0;
  border-bottom: none;
  margin-bottom: 0;
}

.logo-check{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;overflow:visible;}
.logo-check svg{overflow:visible;display:block;}
.logo-box{fill:none;stroke:var(--accent);stroke-width:1.5;transition:fill 0.25s,stroke 0.25s;}
.logo-tick{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:28;stroke-dashoffset:28;transition:stroke 0.15s;}
.logo-check.is-checked .logo-box{fill:#3a8c5c;stroke:#3a8c5c;}
.logo-check.is-checked .logo-tick{stroke:#fff;stroke-dashoffset:0;}
.logo-check.animating .logo-box{animation:logoBoxFill 0.3s ease forwards 0.1s;}
.logo-check.animating .logo-tick{stroke:#fff;animation:logoTickDraw 0.35s cubic-bezier(.2,0,.1,1) forwards 0.12s;}
.logo-check.uncheck .logo-box{animation:logoBoxUnfill 0.25s ease forwards;}
.logo-check.uncheck .logo-tick{animation:logoTickErase 0.2s ease forwards;}
@keyframes logoBoxFill{0%{fill:none;stroke:var(--accent);}100%{fill:#3a8c5c;stroke:#3a8c5c;}}
@keyframes logoTickDraw{from{stroke-dashoffset:28;}to{stroke-dashoffset:0;}}
@keyframes logoBoxUnfill{0%{fill:#3a8c5c;stroke:#3a8c5c;}100%{fill:none;stroke:var(--accent);}}
@keyframes logoTickErase{from{stroke-dashoffset:0;}to{stroke-dashoffset:28;}}

.nav-toggle-btn {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); color: var(--text3);
  cursor: pointer; font-size: 13px; line-height: 1;
  flex-shrink: 0; transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none;
}
.nav-toggle-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

.nav.nav-collapsed {
  width: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
  border-right: none !important;
  box-shadow: none !important;
}

body.nav-is-collapsed .topbar { left: 0 !important; }
body.nav-is-collapsed .panels { left: 0 !important; }

#nav-show-tab {
  display: none;
  position: fixed; top: 50%; left: 0;
  transform: translateY(-50%);
  z-index: 9999;
  writing-mode: vertical-lr;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 8px 8px 0;
  padding: 12px 6px;
  font-size: 11px; font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  letter-spacing: 0.05em;
}

body.nav-is-collapsed #nav-show-tab { display: block; }

/* ===== TOPBAR ===== */
.topbar {
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--border, rgba(0,0,0,0.08));
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}
.topbar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: var(--accent, #1d4fd6);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ===== MAIN CONTENT ===== */
.main { padding: 24px; }

.page-title {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  font-weight: 400;
  margin-bottom: 24px;
  color: var(--text);
}

/* ===== TABS ===== */
.tabs-container {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  padding: 12px 16px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.tab-btn:hover {
  color: var(--text);
  background: var(--surface2);
  border-radius: 4px;
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* ===== MUSCLE GROUP ===== */
.muscle-group {
  margin-bottom: 20px;
  padding: 14px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

.muscle-name {
  font-size: 11px;
  color: var(--text2);
  font-style: italic;
  margin-bottom: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== EXERCISE ROW ===== */
.exercise-row {
  display: grid;
  grid-template-columns: 20px 1fr 80px 80px 100px 60px 40px;
  gap: 10px;
  align-items: center;
  padding: 12px;
  margin-bottom: 8px;
  background: var(--surface);
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 12px;
  transition: all 0.2s;
}

.exercise-row:hover {
  background: var(--surface2);
  border-color: var(--text2);
}

.drag-handle {
  cursor: grab;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  user-select: none;
}

.drag-handle:active { cursor: grabbing; }

.exercise-name {
  font-weight: 500;
  color: var(--text);
  cursor: text;
  padding: 4px;
  border-radius: 3px;
  border: 1px solid transparent;
}

.exercise-name:hover {
  background: var(--accent, rgba(29,79,214,0.08));
  border-color: var(--accent);
}

.editable-input {
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
}

.editable-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface);
}

.date-input {
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text);
  font-size: 11px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.checkbox-wrapper input {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.action-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.action-btn:hover {
  color: var(--text);
  border-color: var(--text2);
}

.action-btn.delete:hover {
  color: #E24B4A;
  border-color: #E24B4A;
}

.add-exercise-btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.add-exercise-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(29, 79, 214, 0.08);
}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  :root{ --nav-width:0px; }
  .topbar { left:0; }
  .panels { left:0; }
}

</style>
</head>
<body>

<div id="nav-show-tab" title="Show sidebar">☰</div>

<!-- NAV -->
<nav class="nav" id="onetrack-nav">
  <div class="nav-header">
    <div class="nav-title">
      <span class="logo-check" id="logoCheck">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px;display:block;overflow:visible;">
          <rect class="logo-box" x="2" y="2" width="16" height="16" rx="4"/>
          <path class="logo-tick" d="M5 10 L8.5 13.5 L22 3"/>
        </svg>
      </span>
      <span id="otBrandName"></span>
    </div>
    <button id="nav-toggle-btn" class="nav-toggle-btn" title="Hide sidebar">&#8249;</button>
  </div>
  <div id="onetrack-nav-links"></div>
</nav>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">✦ Workout Planner</div>
</div>

<!-- PANELS -->
<div class="panels">
  <div class="panel active">
    <div class="main">
      <div class="page-title">Marathon Training</div>

      <!-- TABS -->
      <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('lower')">Lower Body</button>
        <button class="tab-btn" onclick="switchTab('upper')">Upper Body</button>
        <button class="tab-btn" onclick="switchTab('core')">Core</button>
        <button class="tab-btn" onclick="switchTab('cardio')">Cardio</button>
      </div>

      <!-- LOWER BODY TAB -->
      <div id="lower" class="tab-content active">
        <div id="lower-content"></div>
      </div>

      <!-- UPPER BODY TAB -->
      <div id="upper" class="tab-content">
        <div id="upper-content"></div>
      </div>

      <!-- CORE TAB -->
      <div id="core" class="tab-content">
        <div id="core-content"></div>
      </div>

      <!-- CARDIO TAB -->
      <div id="cardio" class="tab-content">
        <div id="cardio-content"></div>
      </div>
    </div>
  </div>
</div>

<script>

const workoutData = {
  lower: [
    { muscle: 'Ankles & Calves (Gastrocnemius, Soleus, Tibialis Anterior)', exercises: [
      { name: 'Calf raises', count: 10, reps: 2, date: '', checked: false },
      { name: 'Single leg calf raises', count: 10, reps: 2, date: '', checked: false },
      { name: 'Single leg skip', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Quadriceps (Front Thigh)', exercises: [
      { name: 'Goblet squats', count: 10, reps: 2, date: '', checked: false },
      { name: '90-90 squats', count: 10, reps: 2, date: '', checked: false },
      { name: 'Lateral squat', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Inner Thighs (Adductors)', exercises: [
      { name: 'Cossack squats', count: 10, reps: 2, date: '', checked: false },
      { name: 'Side leg resistance band (L)', count: 10, reps: 2, date: '', checked: false },
      { name: 'Side leg resistance band (R)', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Hamstrings (Back Thigh)', exercises: [
      { name: 'Romanian deadlifts', count: 10, reps: 2, date: '', checked: false },
      { name: 'Squat to hamstring', count: 10, reps: 2, date: '', checked: false },
      { name: 'Reverse lunges', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Glutes (Power & Endurance)', exercises: [
      { name: 'Glute bridge', count: 10, reps: 2, date: '', checked: false },
      { name: 'Single-leg glute bridge', count: 10, reps: 2, date: '', checked: false },
      { name: 'Forward leg swings', count: 10, reps: 2, date: '', checked: false },
      { name: 'Side leg swings', count: 10, reps: 2, date: '', checked: false }
    ]}
  ],
  upper: [
    { muscle: 'Hands & Forearms (Flexor Digitorum, Extensor Digitorum, Flexor/Extensor Carpi)', exercises: [
      { name: 'Farmer carries', count: 10, reps: 2, date: '', checked: false },
      { name: 'Wrist curls', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Biceps (Front of Arm)', exercises: [
      { name: 'Dumbbell bicep curls', count: 10, reps: 2, date: '', checked: false },
      { name: 'Dumbbell hammer curls', count: 10, reps: 2, date: '', checked: false },
      { name: 'Pull-ups / Assisted pull-ups', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Triceps (Back of Arm)', exercises: [
      { name: 'Dumbbell overhead press', count: 10, reps: 2, date: '', checked: false },
      { name: 'Tricep dips', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Chest (Front Upper Body)', exercises: [
      { name: 'Push-ups', count: 10, reps: 2, date: '', checked: false },
      { name: 'Dumbbell bench press', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Back & Lats (Posterior)', exercises: [
      { name: 'Bent-over rows', count: 10, reps: 2, date: '', checked: false },
      { name: 'Single-arm rows', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Shoulders (Stability & Posture)', exercises: [
      { name: 'Single-arm press', count: 10, reps: 2, date: '', checked: false },
      { name: 'Lateral raises', count: 10, reps: 2, date: '', checked: false },
      { name: 'Face pulls', count: 10, reps: 2, date: '', checked: false }
    ]}
  ],
  core: [
    { muscle: 'Abs (Flexion Movements)', exercises: [
      { name: 'Crunches', count: 10, reps: 2, date: '', checked: false },
      { name: 'Sit-ups', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Obliques (Rotation, Anti-lateral)', exercises: [
      { name: 'Pallof press', count: 10, reps: 2, date: '', checked: false },
      { name: 'Side plank (L)', count: 10, reps: 2, date: '', checked: false },
      { name: 'Side plank (R)', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Hip Flexors & Connectors (Mobility)', exercises: [
      { name: '90-90 hold stretch', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Erector Spinae (Lower Back, Extension)', exercises: [
      { name: 'Plank hold', count: 10, reps: 2, date: '', checked: false },
      { name: 'Dead bug', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Upper Back (Posture)', exercises: [
      { name: 'Bird dog', count: 10, reps: 2, date: '', checked: false }
    ]}
  ],
  cardio: [
    { muscle: 'Skip Rope (Calf endurance + cardio)', exercises: [
      { name: 'Skip rope steady pace', count: 10, reps: 2, date: '', checked: false },
      { name: 'Skip rope high intensity', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Swimming (Full body, low impact)', exercises: [
      { name: 'Freestyle swim', count: 10, reps: 2, date: '', checked: false },
      { name: 'Mixed strokes', count: 10, reps: 2, date: '', checked: false }
    ]},
    { muscle: 'Marathon Running (Primary focus)', exercises: [
      { name: 'Long run', count: 10, reps: 2, date: '', checked: false },
      { name: 'Tempo run', count: 10, reps: 2, date: '', checked: false },
      { name: 'Recovery run', count: 10, reps: 2, date: '', checked: false }
    ]}
  ]
};

function loadData() {
  OT.onReady(async () => {
    const saved = await OT.get('ONETRACK_WORKOUT_DATA');
    if (saved) {
      try {
        Object.assign(workoutData, JSON.parse(saved));
      } catch (e) {
        console.log('Using default workout data');
      }
    }
    renderAllTabs();
  });
}

function saveData() {
  OT.set('ONETRACK_WORKOUT_DATA', JSON.stringify(workoutData));
}

function renderTab(tabId) {
  const container = document.getElementById(tabId + '-content');
  const tab = workoutData[tabId];
  let html = '';

  tab.forEach((group, groupIdx) => {
    html += `<div class="muscle-group">
      <div class="muscle-name">${group.muscle}</div>`;
    
    group.exercises.forEach((ex, exIdx) => {
      html += `<div class="exercise-row" draggable="true" ondragstart="dragStart(event, '${tabId}', ${groupIdx}, ${exIdx})" ondrop="dragDrop(event, '${tabId}', ${groupIdx}, ${exIdx})" ondragover="dragOver(event)">
        <div class="drag-handle">⋮</div>
        <div class="exercise-name" onclick="editField(this, '${tabId}', ${groupIdx}, ${exIdx}, 'name')">${ex.name}</div>
        <input type="number" class="editable-input" value="${ex.count}" min="1" onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'count', this.value); saveData();" placeholder="count">
        <input type="number" class="editable-input" value="${ex.reps}" min="1" onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'reps', this.value); saveData();" placeholder="reps">
        <input type="date" class="date-input" value="${ex.date}" onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'date', this.value); saveData();">
        <input type="checkbox" ${ex.checked ? 'checked' : ''} onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'checked', this.checked); saveData();">
        <button class="action-btn delete" onclick="deleteExercise('${tabId}', ${groupIdx}, ${exIdx})">✕</button>
      </div>`;
    });
    
    html += `<button class="add-exercise-btn" onclick="addExercise('${tabId}', ${groupIdx})">+ Add Exercise</button>
    </div>`;
  });

  container.innerHTML = html;
}

function renderAllTabs() {
  Object.keys(workoutData).forEach(tab => renderTab(tab));
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

function editField(el, tabId, groupIdx, exIdx, field) {
  if (field === 'name') {
    const current = el.textContent;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'editable-input';
    input.value = current;
    input.style.width = '100%';
    el.replaceWith(input);
    input.focus();
    input.onblur = () => {
      workoutData[tabId][groupIdx].exercises[exIdx].name = input.value;
      saveData();
      renderTab(tabId);
    };
    input.onkeypress = (e) => {
      if (e.key === 'Enter') input.blur();
    };
  }
}

function updateField(tabId, groupIdx, exIdx, field, value) {
  if (field === 'checked') {
    workoutData[tabId][groupIdx].exercises[exIdx][field] = value;
  } else {
    workoutData[tabId][groupIdx].exercises[exIdx][field] = value;
  }
}

function deleteExercise(tabId, groupIdx, exIdx) {
  if (confirm('Delete this exercise?')) {
    workoutData[tabId][groupIdx].exercises.splice(exIdx, 1);
    saveData();
    renderTab(tabId);
  }
}

function addExercise(tabId, groupIdx) {
  workoutData[tabId][groupIdx].exercises.push({ name: 'New Exercise', count: 10, reps: 2, date: '', checked: false });
  saveData();
  renderTab(tabId);
}

let draggedItem = null;
function dragStart(e, tabId, groupIdx, exIdx) {
  draggedItem = { tabId, groupIdx, exIdx };
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function dragDrop(e, tabId, groupIdx, exIdx) {
  e.preventDefault();
  if (!draggedItem) return;
  const from = draggedItem;
  if (from.tabId === tabId && from.groupIdx === groupIdx) {
    const exercises = workoutData[tabId][groupIdx].exercises;
    const newIdx = exIdx;
    if (newIdx >= 0 && newIdx < exercises.length && newIdx !== from.exIdx) {
      [exercises[from.exIdx], exercises[newIdx]] = [exercises[newIdx], exercises[from.exIdx]];
      saveData();
      renderTab(tabId);
    }
  }
  draggedItem = null;
}

loadData();

</script>

</body>
</html>
